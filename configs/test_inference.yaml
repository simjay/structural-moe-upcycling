experiments:
  - name: test-inference
    remote_workdir: /root/workspace
    setup_commands:
      - pip install --upgrade pip
      - >-
        pip install torch torchvision
        --index-url https://download.pytorch.org/whl/cu121
      - pip install transformers accelerate sentencepiece protobuf
    train_command: >-
      python3 -c "
      import torch;
      from transformers import AutoModelForCausalLM, AutoTokenizer;
      tok = AutoTokenizer.from_pretrained('Qwen/Qwen1.5-1.8B', trust_remote_code=True);
      model = AutoModelForCausalLM.from_pretrained('Qwen/Qwen1.5-1.8B', torch_dtype=torch.bfloat16, device_map='auto', trust_remote_code=True);
      out = model.generate(**tok('Hello, my name is', return_tensors='pt').to(model.device), max_new_tokens=32, do_sample=False);
      print(tok.decode(out[0], skip_special_tokens=True));
      "
    upload_paths: []
    download_paths: []
